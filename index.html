<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaintainIQ — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233b66f5'/><text x='50' y='68' font-size='58' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'>M</text></svg>" />
</head>
<body>
  <div class="app-bg"></div>

  <!-- Theme toggle -->
  <button class="btn btn-ghost btn-icon theme-toggle-auth" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
  </button>

  <div class="auth-wrap">
    <div class="auth-card glass-strong">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div class="brand-name">Maintain<span>IQ</span></div>
      </div>

      <h1 class="auth-title" id="authTitle">Welcome back</h1>
      <p class="auth-sub" id="authSub">Sign in to access the maintenance control panel.</p>

      <div class="auth-error" id="authError"></div>

      <form class="auth-form" id="authForm" autocomplete="on">
        <div class="field" id="nameField" style="display:none">
          <label for="nameInput">Full name</label>
          <input class="input" id="nameInput" type="text" placeholder="Jane Technician" autocomplete="name" />
        </div>
        <div class="field">
          <label for="emailInput">Email</label>
          <input class="input" id="emailInput" type="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="passwordInput">Password</label>
          <input class="input" id="passwordInput" type="password" placeholder="••••••••" autocomplete="current-password" required minlength="6" />
        </div>
        <button class="btn btn-primary" id="authSubmit" type="submit">
          <span id="submitLabel">Sign in</span>
        </button>
      </form>

      <p class="auth-switch">
        <span id="switchText">New to MaintainIQ?</span>
        <button type="button" id="switchMode">Create an account</button>
      </p>
    </div>
  </div>

  <div id="toast-stack"></div>

  

<!-- Yeh tumhari main file hai -->
<script type="module" src="auth.js"></script>
</body>
</html>
